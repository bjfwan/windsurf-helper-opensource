<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>账号管理 - Windsurf助手</title>
  <link rel="stylesheet" href="styles-modern.css">
  <link rel="stylesheet" href="accounts.css">
</head>
<body>
  <div class="container">
    <div class="header">
      <button id="back-btn" class="btn-icon" title="返回">←</button>
      <h1>📋 账号管理</h1>
      <button id="refresh-btn" class="btn-icon" title="刷新">⟳</button>
    </div>
    
    <div class="toolbar">
      <input
        type="text"
        id="search-input"
        class="search-input"
        placeholder="搜索邮箱或用户名..."
        aria-label="搜索账号"
        autocomplete="off"
        spellcheck="false"
      >
      <button id="export-btn" class="btn btn-secondary" title="导出当前账号为 CSV 文件">导出CSV</button>
      <button id="clear-btn" class="btn btn-danger" title="清空本地全部账号（不可恢复）">清空本地</button>
    </div>
    
    <div class="stats">
      <div class="stat-item">
        <span class="stat-label">总计:</span>
        <span id="total-count" class="stat-value">0</span>
      </div>
      <div class="stat-item">
        <span class="stat-label">已验证:</span>
        <span id="verified-count" class="stat-value">0</span>
      </div>
      <div class="stat-item">
        <span class="stat-label">待验证:</span>
        <span id="pending-count" class="stat-value">0</span>
      </div>
    </div>
    
    <div id="accounts-list" class="accounts-list">
      <!-- 账号列表动态生成 -->
    </div>
    
    <div id="empty-state" class="empty-state hidden">
      <div class="empty-icon">📭</div>
      <p>暂无账号记录</p>
      <button id="start-register-btn" class="btn btn-primary">开始注册</button>
    </div>
    
    <div id="loading" class="loading hidden" role="status" aria-live="polite">
      <div class="loading-spinner" aria-hidden="true"></div>
      <p>加载中...</p>
    </div>
    
    <!-- 调试面板 -->
    <div id="debug-panel" class="debug-panel">
      <div class="debug-panel-header">
        <strong>🐛 调试信息</strong>
        <div class="debug-panel-actions">
          <button id="copy-debug-btn" class="btn-debug-copy">📋 复制</button>
          <button id="clear-debug-btn" class="btn-debug-clear">清空</button>
          <button id="toggle-debug" class="btn-debug-toggle">隐藏</button>
        </div>
      </div>
      <div id="debug-logs" class="debug-logs"></div>
    </div>
    <button id="show-debug" class="debug-show-btn">🐛 调试</button>
  </div>
  
  <script src="../utils/logger.js"></script>
  <script src="../utils/ui-toast.js"></script>
  <script src="../utils/db-manager.js"></script>
  <script src="../email-config.js"></script>
  <script src="../utils/temp-mail-client.js"></script>
  <script src="../config.js"></script>
  <script src="../utils/api-client.js"></script>
  <script src="accounts.js"></script>
</body>
</html>
